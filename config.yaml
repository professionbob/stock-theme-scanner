# =========================
# Stock Theme Scanner Config
# =========================
# 這份設定檔是核心：你可以自行增減主題、標的、門檻。

runtime:
  timezone: Asia/Taipei
  market: all               # all / TW / US
  mode: once                # once / loop
  scan_interval_seconds: 300
  # 全股票池列出排名前 10 名；但只特別標示前 3 名為推薦候選。
  top_pool_count: 10
  recommended_count: 3
  # 舊版參數保留，避免舊程式引用失敗。新版報告主要使用上面兩個參數。
  recommended_count_per_market: 3
  max_candidates_per_market: 3
  output_dir: reports
  enable_telegram: true
  enable_console: true

risk:
  max_single_position_pct: 15
  s_position_pct: [10, 15]
  a_position_pct: [5, 10]
  b_position_pct: [3, 5]
  watch_position_pct: [0, 0]
  min_rr_to_recommend: 1.8
  prefer_rr: 2.0
  max_atr_pct: 8.0
  max_rsi_to_enter: 74
  overextended_from_ema20_pct: 8.0
  min_price_usd: 2.0
  min_avg_volume_us: 500000
  min_avg_turnover_usd: 5000000
  min_avg_volume_tw: 500000
  min_avg_turnover_twd: 30000000

benchmarks:
  US: QQQ
  TW: ^TWII

# 你有實際持股時，直接填在這裡，scanner 會每天檢查停損/目標/是否減碼。
portfolio:
  - ticker: ONDS
    market: US
    shares: 300
    avg_cost: 9.08
    stop: 9.03
    target1: 10.23
    target2: 10.98
    theme: space
  # - ticker: 2330.TW
  #   market: TW
  #   shares: 0
  #   avg_cost: 0
  #   stop: 0
  #   target1: 0
  #   target2: 0
  #   theme: ai_infra

# 主題權重：越符合你想追的主線，分數越高。
theme_weights:
  ai_infra: 1.25
  cooling: 1.20
  storage: 1.15
  cleanroom: 1.10
  glass_substrate: 1.10
  advanced_packaging: 1.25
  space: 1.10
  robotics: 1.05
  ai_applications: 1.05
  power: 1.20

# 新聞關鍵字，用於 yfinance news / Finnhub news 的簡易催化劑判讀。
catalyst_keywords:
  - ai
  - artificial intelligence
  - data center
  - datacenter
  - cloud
  - gpu
  - server
  - hbm
  - memory
  - cpo
  - co-packaged optics
  - optical
  - photonics
